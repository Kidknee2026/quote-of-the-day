
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote of the Day</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to right,#f4f6ff,#f9f2dc,#f4f6ff);
    color:#1d2433;
}

.wrapper{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

h1{
    font-size:64px;
}

.search-box{
    background:white;
    padding:18px;
    border-radius:18px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

select,button{
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    background:#574bff;
    color:white;
    border:none;
    cursor:pointer;
}

#quoteBox{
    margin-top:20px;
    background:white;
    padding:25px;
    border-radius:18px;
    display:none;
}

.quote{
    font-size:34px;
    line-height:1.4;
}

.source{
    margin-top:10px;
    font-weight:bold;
}

.meaning{
    margin-top:10px;
    color:#444;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Quote of the Day</h1>

<div class="search-box">

<select id="religion">
<option value="">Select religion</option>
<option>Buddhism</option>
<option>Christianity</option>
<option>Hinduism</option>
<option>Islam</option>
<option>Judaism</option>
</select>

<select id="topic">
<option value="">Select topic</option>
<option>Faith</option>
<option>Justice</option>
<option>Love</option>
<option>Patience</option>
<option>Peace</option>
<option>Wisdom</option>
</select>

<select id="language">
<option value="">Select language</option>
<option>English</option>
</select>

<button onclick="showQuote()">Show Quote</button>

</div>

<div id="quoteBox">
<div class="quote" id="quote"></div>
<div class="source" id="source"></div>
<div class="meaning" id="meaning"></div>
</div>

</div>

<script>

let allQuotes = {};

fetch("quotes.json")
.then(response => response.json())
.then(data => {
    allQuotes = data;
});

function showQuote(){

    const religion = document.getElementById("religion").value;
    const topic = document.getElementById("topic").value;
    const language = document.getElementById("language").value;

    if(!religion || !topic || !language){
        alert("Please select all fields.");
        return;
    }

    const religionQuotes = allQuotes[religion] || [];

    const filtered = religionQuotes.filter(q =>
        q.topic === topic &&
        q.language === language
    );

    if(filtered.length === 0){
        alert("No matching quote found.");
        return;
    }

    const randomQuote =
        filtered[Math.floor(Math.random() * filtered.length)];

    document.getElementById("quote").innerText = randomQuote.quote;
    document.getElementById("source").innerText = randomQuote.source;
    document.getElementById("meaning").innerText = randomQuote.meaning;

    document.getElementById("quoteBox").style.display = "block";
}
</script>

</body>
</html>
